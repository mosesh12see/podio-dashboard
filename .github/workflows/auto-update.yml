name: Auto Update Podio Dashboard

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:  # Allow manual trigger
  push:
    branches: [ main ]
    paths:
      - 'generate_complete_dashboard.py'
      - '.github/workflows/auto-update.yml'

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for proper commits

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Generate all dashboards
        env:
          PODIO_CLIENT_ID: ${{ secrets.PODIO_CLIENT_ID }}
          PODIO_CLIENT_SECRET: ${{ secrets.PODIO_CLIENT_SECRET }}
          PODIO_USERNAME: ${{ secrets.PODIO_USERNAME }}
          PODIO_PASSWORD: ${{ secrets.PODIO_PASSWORD }}
        run: |
          python generate_complete_dashboard.py
          echo "✅ Complete dashboard generated"
          python generate_ivan_mfsm_dashboard.py
          echo "✅ Ivan MFSM dashboard generated at $(date)"

      - name: Commit and push if changed
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add complete_dashboard.html ivan_mfsm_dashboard.html

          # Check if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update dashboard - $(date +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "✅ Dashboard updated and pushed"
          fi
